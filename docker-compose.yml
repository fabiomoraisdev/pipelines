services:
  jenkins-blueocean:
    build:
      context: ./jenkins_build
    container_name: jenkins-blueocean
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins-data:/var/jenkins_home
      - $HOME:/home
    environment:
      DOCKER_TLS_CERTDIR: ""
      JAVA_OPTS: "-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true"
    restart: always

volumes:
  jenkins-data:
